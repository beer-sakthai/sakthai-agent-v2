<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SakThai-Agent | Modern Dashboard</title>
    <meta name="description" content="A rich, dynamic interface for the SakThai memory agent." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="app">
      <header class="glass-header">
        <h1>SakThai Dashboard</h1>
        <p class="subtitle">Live Memory & Evaluation Interface</p>
      </header>
      
      <main class="dashboard-grid">
        <section id="metrics" class="card fade-in">
          <h2>Core Metrics</h2>
          <div id="metrics-container" class="grid-2">
            <!-- Metrics injected via JS -->
          </div>
        </section>

        <section id="memory-gallery" class="card fade-in delay-1">
          <h2>Memory Gallery</h2>
          <div id="gallery-container">
            <!-- Gallery items injected via JS -->
          </div>
        </section>

        <section id="skills" class="card fade-in delay-2">
          <h2>Agent Skills</h2>
          <div id="skills-container">
            <!-- Skills injected via JS -->
          </div>
        </section>
      </main>
      
      <div id="tooltip" class="tooltip hidden"></div>
      <div id="toast" class="toast hidden"></div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
