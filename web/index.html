<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SakThai — Memory Dashboard</title>
  <meta name="description" content="A static view of SakThai's persistent memory: facts, observations, growth, and categories.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>SakThai <span>— Memory Dashboard</span></h1>
    <p id="source" class="muted"></p>
  </header>

  <main>
    <section class="kpis" id="kpis"></section>

    <section class="grid">
      <div class="card">
        <h2>Cumulative growth</h2>
        <canvas id="growth" width="560" height="240" aria-label="Growth chart"></canvas>
        <div class="legend">
          <span class="dot facts"></span> Facts
          <span class="dot obs"></span> Observations
        </div>
      </div>
      <div class="card">
        <h2>By category</h2>
        <div id="categories" class="bars"></div>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Recent facts</h2>
        <table id="facts"><tbody></tbody></table>
      </div>
      <div class="card">
        <h2>Top observations</h2>
        <table id="observations"><tbody></tbody></table>
      </div>
    </section>
  </main>

  <footer class="muted">
    Hydrated from <code>data.json</code> · <code>sakthai dashboard --export web/data.json</code>
  </footer>

  <script src="app.js"></script>
</body>
</html>
