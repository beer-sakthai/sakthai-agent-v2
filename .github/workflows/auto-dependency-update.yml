name: Auto Dependency Update

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  schedule:
    # Runs at 08:00 UTC every Monday
    - cron: '0 8 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # We use a PAT so that the push event from this action can trigger the main CI workflow
          token: ${{ secrets.GH_PAT_FOR_ACTIONS }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache: true
          python-version: '3.12'

      - name: Configure Git
        run: |
          git config user.name "SakJules [bot]"
          git config user.email "actions@github.com"

      - name: Create new branch
        id: branch
        run: |
          BRANCH_NAME="chore/deps-$(date +%Y-%m-%d)"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git checkout -b $BRANCH_NAME

      - name: Upgrade dependencies
        id: upgrade
        run: |
          uv lock --upgrade
          # Check if the lockfile changed. If not, we can exit early.
          if git diff --quiet uv.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No dependency changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Dependencies upgraded. Proceeding to validation."
          fi

      - name: Validate changes
        if: steps.upgrade.outputs.changed == 'true'
        run: |
          uv sync --extra dev
          uv run pytest tests/ -q -m "not integration"

      - name: Create Pull Request
        if: steps.upgrade.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_ACTIONS }}
        run: |
          git add pyproject.toml uv.lock
          git commit -m "build: Automated dependency upgrade" -m "Automated dependency upgrade by SakJules."
          git push origin ${{ steps.branch.outputs.name }}

          gh pr create \
            --title "build: Automated Dependency Upgrade" \
            --body "This PR was automatically generated by the SakJules agent. It contains the latest dependency versions that pass all local tests." \
            --base main \
            --head ${{ steps.branch.outputs.name }}

      - name: Report no changes
        if: steps.upgrade.outputs.changed == 'false'
        run: echo "No new dependency versions found. Workflow complete."