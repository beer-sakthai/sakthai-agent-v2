name: Pylint

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -e ".[dev]" || pip install -e "."
    - name: Analysing the code with pylint
      run: |
        # Monorepo: lint only the core sakthai-agent package + its tests.
        # Co-located packages (packages/*, infra/*, personas/*) carry their own
        # quality bars and are not held to this repo's pylint thresholds.
        pylint --fail-under=7.0 $(git ls-files | grep -E '^(sakthai|tests|scripts)/.*\.py$')
        pylint sakthai --disable=R0801,R0401 --fail-under=9.0
