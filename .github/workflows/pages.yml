name: Deploy web to Pages

# Builds the Vite dashboard in web-dashboard/ and publishes dist/ to GitHub Pages.
#
# Pages must be enabled once (Settings → Pages → Build and deployment → Source:
# "GitHub Actions"). Runs on pushes to main that touch the dashboard, and can be
# triggered manually from the Actions tab or with `gh workflow run pages.yml`.
on:
  push:
    branches: [main]
    paths:
      - "web-dashboard/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
