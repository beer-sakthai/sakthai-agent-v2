name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect secrets (gitleaks)
        # Run the gitleaks binary directly rather than gitleaks-action@v2, which
        # now requires GITHUB_TOKEN to scan PRs and rejects config-path/fail
        # inputs. The binary scans full history (fetch-depth: 0) with no token.
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  test:
    needs: secret-scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Cache the uv executable itself.
          cache: true
          python-version: ${{ matrix.python-version }}

      # --locked fails the build if uv.lock is stale, so CI exercises the same
      # pinned dependency set as local development (the repo is uv-managed).
      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install (locked)
        run: uv sync --extra dev --locked

      - name: Lint (ruff)
        run: uv run ruff check sakthai tests

      - name: Format check (ruff)
        run: uv run ruff format --check sakthai tests

      - name: Type check (mypy)
        run: uv run mypy sakthai

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r sakthai

      - name: Tests (pytest)
        run: uv run pytest tests/ -q -m "not integration" --cov=sakthai --cov-branch --cov-report=term-missing

  dashboard-test:
    needs: secret-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          # Matches pages.yml, which builds this same dashboard package.
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install (locked)
        run: npm ci

      - name: Tests (vitest)
        run: npm test
