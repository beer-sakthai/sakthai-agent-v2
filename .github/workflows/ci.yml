name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets (gitleaks)
        # Run the gitleaks binary directly rather than gitleaks-action@v2, which
        # now requires GITHUB_TOKEN to scan PRs and rejects config-path/fail
        # inputs. The binary scans full history (fetch-depth: 0) with no token.
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  test:
    needs: secret-scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check sakthai tests

      - name: Format check (ruff)
        run: ruff format --check sakthai tests

      - name: Type check (mypy)
        run: mypy sakthai

      - name: Security scan (bandit)
        run: bandit -c pyproject.toml -r sakthai

      - name: Tests (pytest)
        run: pytest tests/ -q -m "not integration" --cov=sakthai --cov-report=term-missing
