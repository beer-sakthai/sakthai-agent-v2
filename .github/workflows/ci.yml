name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect secrets (gitleaks)
        # Run the gitleaks binary directly rather than gitleaks-action@v2, which
        # now requires GITHUB_TOKEN to scan PRs and rejects config-path/fail
        # inputs. The binary scans full history (fetch-depth: 0) with no token.
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  test:
    needs: secret-scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # --locked fails the build if uv.lock is stale, so CI exercises the same
      # pinned dependency set as local development (the repo is uv-managed).
      - name: Install (locked)
        run: uv sync --extra dev --locked

      - name: Lint (ruff)
        run: uv run ruff check sakthai tests

      - name: Format check (ruff)
        run: uv run ruff format --check sakthai tests

      - name: Type check (mypy)
        run: uv run mypy sakthai

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r sakthai

      - name: Tests (pytest)
        run: uv run pytest tests/ -q -m "not integration" --cov=sakthai --cov-report=term-missing

  smoke:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install (locked)
        run: uv sync --extra dev --locked

      # Launch and drive the real app — the CLI, the agent preflight, the
      # dashboard export, and a live MCP stdio JSON-RPC roundtrip — in a
      # throwaway home. No API key or network needed; exits non-zero if any
      # surface is broken.
      - name: Smoke test (live CLI + MCP)
        # The dry-run agent preflight only resolves provider/credentials/model/
        # tools — it makes no API call — so a dummy key is enough to satisfy
        # credential resolution on a runner that has none.
        env:
          ANTHROPIC_API_KEY: dummy-key-no-network-call
        run: uv run python .claude/skills/run-sakthai-agent-v2/driver.py
